# Default stack matching reality-ezpz.sh: sing-box + Reality + TCP on port 443.
# engine.conf is generated by the upstream script (e.g. under /opt/reality-ezpz on the server)
# or copied from there; other modes (letsencrypt, selfsigned, tuic, etc.) need a different
# compose as generated by generate_docker_compose in reality-ezpz.sh.
#
# https://raw.githubusercontent.com/aleskxyz/reality-ezpz/refs/heads/master/reality-ezpz.sh

services:
  engine:
    image: gzxhwq/sing-box:1.12.14
    restart: always
    environment:
      TZ: Etc/UTC
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./engine.conf:/etc/sing-box/config.json
    networks:
      - reality

networks:
  reality:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: fc11::1:0/112

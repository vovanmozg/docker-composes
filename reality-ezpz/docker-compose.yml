# Default stack matching reality-ezpz.sh: sing-box + Reality + TCP on port 443.
# engine.conf must exist as a FILE before the first `docker compose up` (copy from
# /opt/reality-ezpz/engine.conf after running reality-ezpz.sh, or scp it). If it is missing,
# Docker may have created a directory named engine.conf — remove it (`rm -rf engine.conf`)
# and add the real file, or sing-box will error: config.json: is a directory.
# Other modes (letsencrypt, selfsigned, tuic, etc.) need a different compose from
# generate_docker_compose in reality-ezpz.sh.
#
# https://raw.githubusercontent.com/aleskxyz/reality-ezpz/refs/heads/master/reality-ezpz.sh

services:
  engine:
    image: gzxhwq/sing-box:1.12.14
    restart: always
    environment:
      TZ: Etc/UTC
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      # create_host_path: false avoids Docker creating ./engine.conf as an empty directory
      # when the file is missing (which breaks sing-box with "config.json: is a directory").
      - type: bind
        source: ./engine.conf
        target: /etc/sing-box/config.json
        bind:
          create_host_path: false
    networks:
      - reality

networks:
  reality:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: fc11::1:0/112

version: '3.8'

services:
  ollama:
    image: ollama/ollama
    ports:
      - 11434:11434
    environment:
      - CUDA_ERROR_LEVEL=50
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama:

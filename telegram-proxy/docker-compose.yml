services:
  mtproto-proxy:
    image: nineseconds/mtg:2
    container_name: mtproto-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:9443:443"
    # Secret hostname must match TLS SNI routed to this port in nginx stream
    # (e.g. vpn_mux: cloudflare.com → 127.0.0.1:9443). Example:
    #   docker run --rm nineseconds/mtg:2 generate-secret cloudflare.com
    command: ["simple-run", "0.0.0.0:443", "${SECRET}"]

services:
  mtproto-proxy:
    image: nineseconds/mtg:2
    container_name: mtproto-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:9443:443"
    # mtg secret (not interchangeable with old telegrammessenger/proxy hex):
    #   docker run --rm nineseconds/mtg:2 generate-secret your.domain.tld
    command: ["simple-run", "0.0.0.0:443", "${SECRET}"]
